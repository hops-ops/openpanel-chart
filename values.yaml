# Default values for openpanel
# This is a YAML-formatted file.

# Global configuration
# Allows overriding container image registry and setting imagePullSecrets
global:
  # If set, prefixes all component images, e.g. "my-registry.example.com"
  imageRegistry: ""
  # List of imagePullSecrets to attach to all Pods
  # Example:
  # imagePullSecrets:
  #   - name: my-regcred
  imagePullSecrets: []

# PostgreSQL Configuration
# Set postgresql.enabled=true to deploy PostgreSQL in Kubernetes
# Set postgresql.enabled=false to use external PostgreSQL
postgresql:
  enabled: false  # Set to true for self-hosted PostgreSQL
  image:
    repository: postgres
    tag: "14-alpine"
  user: postgres
  password: postgres  # Change this in production!
  database: postgres
  service:
    name: op-db
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""  # Use default storage class
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  # Taints and tolerations for PostgreSQL pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "postgresql"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for PostgreSQL pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel

# External PostgreSQL Configuration (when postgresql.enabled=false)
externalPostgresql:
  host: "<postgres_host>"
  port: 5432
  user: "<postgres_user>"
  password: "<postgres_password>"  # Change this!
  database: "<database_name>"
  schema: public

# Redis Configuration
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.2.5-alpine"
  service:
    name: op-kv
    port: 6379
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  # Taints and tolerations for Redis pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "redis"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for Redis pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel

# External Redis Configuration (when redis.enabled=false)
externalRedis:
  host: "redis.example.com"
  port: 6379

# ClickHouse Configuration
clickhouse:
  enabled: true
  image:
    repository: clickhouse/clickhouse-server
    tag: "25.10.2.65"
  service:
    name: op-ch
    httpPort: 8123
    nativePort: 9000
  database: openpanel
  persistence:
    enabled: true
    dataSize: 50Gi
    logsSize: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  # Taints and tolerations for ClickHouse pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "clickhouse"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for ClickHouse pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel

# External ClickHouse Configuration (when clickhouse.enabled=false)
externalClickhouse:
  host: "clickhouse.example.com"
  port: 8123
  database: openpanel

# API Configuration
api:
  enabled: true
  image:
    repository: lindesvard/openpanel-api
    tag: "2.2.1"
  service:
    name: op-api
    type: ClusterIP
    port: 3000
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  # Taints and tolerations for API pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "api"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for API pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel
  # Horizontal Pod Autoscaler (HPA) configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Dashboard Configuration
dashboard:
  enabled: true
  image:
    repository: lindesvard/openpanel-dashboard
    tag: "2.2.1"
  service:
    name: op-dashboard
    type: ClusterIP
    port: 3000
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  # Taints and tolerations for Dashboard pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "dashboard"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for Dashboard pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel
  # Horizontal Pod Autoscaler (HPA) configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Worker Configuration
worker:
  enabled: true
  image:
    repository: lindesvard/openpanel-worker
    tag: "2.2.1"
  service:
    name: op-worker
    type: ClusterIP
    port: 3000
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  # Taints and tolerations for Worker pods
  tolerations: []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "worker"
  #   effect: "NoSchedule"
  # Pod affinity/anti-affinity for Worker pods
  affinity: {}
  # Example:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - openpanel
  # Horizontal Pod Autoscaler (HPA) configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Application Configuration
config:
  # Domain configuration
  apiUrl: "https://<fqdn>/api"
  dashboardUrl: "https://<fqdn>"
  
  # Application settings
  nodeEnv: "production"
  selfHosted: "true"
  
  # Registration settings
  allowRegistration: "true"
  allowInvitation: "true"
  
  # Optional: AI features
  aiModel: "gpt-4o-mini"  # Options: gpt-4o, gpt-4o-mini, claude-3-5
  
  # OAuth redirect URIs
  googleRedirectUri: "https://<fqdn>/api/oauth/google/callback"

# ---------------------------------------------------------------------------
# Admin OIDC auth — opt-in JWT-bearer auth for /manage routes
#
# When enabled, the api pod validates `Authorization: Bearer <jwt>`
# headers against the configured OIDC issuer's JWKS (discovered via
# the issuer's `/.well-known/openid-configuration`). Tokens must carry
# the configured audience and a role claim matching `requiredRole`.
#
# Requires the openpanel-app fork (hops-ops/openpanel-app) that adds
# the validateAdminJwtRequest middleware. With the upstream OpenPanel
# image, these env vars are simply unset and no behavior changes.
#
# Off by default. The existing /manage Client-pair auth
# (openpanel-client-id + openpanel-client-secret) continues to work
# either way.
# ---------------------------------------------------------------------------
adminAuth:
  oidc:
    enabled: false
    # The OIDC issuer's base URL — e.g. https://auth.example.com.
    # The api pod fetches <issuer>/.well-known/openid-configuration on
    # boot to discover the JWKS endpoint.
    issuer: ""
    # JWT `aud` claim the api pod requires. Typically the
    # OpenPanel-admin Application's audience in your IdP.
    audience: "openpanel-admin"
    # Role string the api pod requires in the token's claims. Looked up
    # in `roles[]`, `scope` (space-separated), and Zitadel's nested
    # `urn:zitadel:iam:org:project:roles` map. Defaults to
    # "openpanel:admin".
    requiredRole: "openpanel:admin"
    # Claim name that holds the Organization ID the token is scoped to.
    # Defaults to Zitadel's `urn:zitadel:iam:user:resourceowner:id`.
    # Set to "organization_id" or similar for Keycloak / generic IdPs.
    orgClaim: ""

# ---------------------------------------------------------------------------
# Secrets
#
# Each runtime-credential concern lives in its own Kubernetes Secret so
# the credential's source-of-truth maps to one Secret (DB creds from
# CNPG, OAuth client from Zitadel provider, cookie from ESO+AWS SM,
# etc.) rather than a single monolithic blob.
#
# For each concern below:
#   * `existingSecret: <name>` — Deployments reference that Secret;
#                                 chart does NOT create one.
#   * `existingSecret: ""`     — chart creates `openpanel-<concern>`
#                                 from the inline values. Plaintext —
#                                 dev only.
#
# Every Deployment env var references the per-concern Secret with
# `secretKeyRef.optional: true` for optional concerns, so the env var
# simply isn't set when the operator doesn't configure that concern.
# ---------------------------------------------------------------------------
secrets:

  # === database (REQUIRED) ============================================
  # The app reads DATABASE_URL and DATABASE_URL_DIRECT (Prisma direct
  # connection used for migrations; same DSN by default).
  #
  # Chart-managed mode composes the DSNs from `postgresql.*` (when
  # `postgresql.enabled`) or `externalPostgresql.*`. Production
  # installs should set `existingSecret` to a Secret materialized by
  # ExternalSecrets / sealed-secrets / Crossplane composition.
  database:
    existingSecret: ""

  # === redis (REQUIRED) ===============================================
  # The app reads REDIS_URL.
  redis:
    existingSecret: ""

  # === clickhouse (REQUIRED) ==========================================
  # The app reads CLICKHOUSE_URL.
  clickhouse:
    existingSecret: ""

  # === cookie (REQUIRED) ==============================================
  # 32-byte random session encryption key. Generate with:
  #   openssl rand -base64 32
  cookie:
    existingSecret: ""
    value: ""   # used only when existingSecret is empty

  # === email (OPTIONAL) ===============================================
  # Resend-only today. SMTP keys (SMTP_HOST/PORT/SECURE/USER/PASS) are
  # planned via upstream PR #342; the chart will pick them up
  # transparently when the Secret has those keys.
  email:
    existingSecret: ""
    resendApiKey: ""
    sender: ""

  # === oauth-google (OPTIONAL) ========================================
  oauthGoogle:
    existingSecret: ""
    clientId: ""
    clientSecret: ""

  # === oauth-oidc (OPTIONAL) ==========================================
  # Generic OIDC provider (Zitadel, Keycloak, Authentik, Okta, etc.).
  # Requires the openpanel/openpanel-app fork with OIDC support.
  oauthOidc:
    existingSecret: ""
    clientId: ""
    clientSecret: ""
    redirectUri: ""              # <dashboard>/api/oauth/oidc/callback
    authorizationEndpoint: ""
    tokenEndpoint: ""

  # === ai (OPTIONAL) ==================================================
  # Set whichever your config.aiModel selects. Both keys are read; the
  # app picks the appropriate one based on AI_MODEL.
  ai:
    existingSecret: ""
    openaiApiKey: ""
    anthropicApiKey: ""

# Gateway API HTTPRoute (alternative to ingress.* for clusters running
# an Istio / Envoy Gateway / Kong / etc. Gateway API implementation).
# When enabled, the route attaches to the listed `parentRefs` and
# splits traffic: `/api` → op-api, everything else → op-dashboard.
httpRoute:
  enabled: false
  # parentRefs is a list of { name, namespace?, sectionName? }.
  # Example:
  #   parentRefs:
  #     - name: platform
  #       namespace: istio-ingress
  parentRefs: []
  # Hostnames the route accepts. When empty, falls back to [ingress.fqdn].
  hostnames: []

# Ingress Configuration
ingress:
  enabled: true
  type: httpproxy  # Options: httpproxy, standard
  fqdn: <fqdn> # Common FQDN for both ingress types
  
  # For HTTPProxy (Contour)
  httpproxy:
    tlsSecretName: <tls_secret_name>
  
  # For standard Ingress (nginx, traefik, etc.)
  standard:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Remove this if not using cert-manager
    # tlsSecretName: <tls_secret_name>  # Optional: Only needed for manual TLS certs. Leave empty/unset when using cert-manager/Let's Encrypt
