{{- if .Values.httpRoute.enabled }}
{{- $hostnames := .Values.httpRoute.hostnames }}
{{- if and (not $hostnames) .Values.ingress.fqdn }}
{{- $hostnames = list .Values.ingress.fqdn }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openpanel
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: route
spec:
  parentRefs:
{{ toYaml .Values.httpRoute.parentRefs | indent 4 }}
{{- if $hostnames }}
  hostnames:
{{ toYaml $hostnames | indent 4 }}
{{- end }}
  rules:
    # /api/* → op-api (path prefix stripped to match upstream HTTPProxy
    # behaviour: chart's HTTPProxy rewrites /api to /).
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.api.service.name }}
          port: {{ .Values.api.service.port }}
    # Default → op-dashboard
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.dashboard.service.name }}
          port: {{ .Values.dashboard.service.port }}
{{- end }}
