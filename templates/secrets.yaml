# Per-concern Secrets. Each is gated on the operator NOT supplying
# their own `secrets.<concern>.existingSecret`. Optional concerns
# (email, oauth-google, oauth-oidc, ai) only render when there's at
# least one inline value to populate the Secret with; Deployment
# env entries reference these Secrets with `secretKeyRef.optional: true`
# so absence is fine.

# ----------------------------------------------------------------------
# Database (REQUIRED)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.database.existingSecret }}
{{- $dbUrl := "" }}
{{- if .Values.postgresql.enabled }}
  {{- $dbUrl = printf "postgresql://%s:%s@%s:%v/%s?schema=public" .Values.postgresql.user .Values.postgresql.password .Values.postgresql.service.name .Values.postgresql.service.port .Values.postgresql.database }}
{{- else }}
  {{- $dbUrl = printf "postgresql://%s:%s@%s:%v/%s?schema=%s" .Values.externalPostgresql.user .Values.externalPostgresql.password .Values.externalPostgresql.host .Values.externalPostgresql.port .Values.externalPostgresql.database .Values.externalPostgresql.schema }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-database
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: database
type: Opaque
stringData:
  DATABASE_URL: {{ $dbUrl | quote }}
  DATABASE_URL_DIRECT: {{ $dbUrl | quote }}
---
{{- end }}

# ----------------------------------------------------------------------
# Redis (REQUIRED)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.redis.existingSecret }}
{{- $redisUrl := "" }}
{{- if .Values.redis.enabled }}
  {{- $redisUrl = printf "redis://%s:%v" .Values.redis.service.name .Values.redis.service.port }}
{{- else }}
  {{- $redisUrl = printf "redis://%s:%v" .Values.externalRedis.host .Values.externalRedis.port }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: redis
type: Opaque
stringData:
  REDIS_URL: {{ $redisUrl | quote }}
---
{{- end }}

# ----------------------------------------------------------------------
# ClickHouse (REQUIRED)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.clickhouse.existingSecret }}
{{- $chUrl := "" }}
{{- if .Values.clickhouse.enabled }}
  {{- $chUrl = printf "http://%s:%v/%s" .Values.clickhouse.service.name .Values.clickhouse.service.httpPort .Values.clickhouse.database }}
{{- else }}
  {{- $chUrl = printf "http://%s:%v/%s" .Values.externalClickhouse.host .Values.externalClickhouse.port .Values.externalClickhouse.database }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: clickhouse
type: Opaque
stringData:
  CLICKHOUSE_URL: {{ $chUrl | quote }}
---
{{- end }}

# ----------------------------------------------------------------------
# Cookie session encryption key (REQUIRED)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.cookie.existingSecret }}
{{- if not .Values.secrets.cookie.value }}
{{- fail "secrets.cookie.value is required when secrets.cookie.existingSecret is empty. Generate with: openssl rand -base64 32" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-cookie
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: cookie
type: Opaque
stringData:
  COOKIE_SECRET: {{ .Values.secrets.cookie.value | quote }}
---
{{- end }}

# ----------------------------------------------------------------------
# Email (OPTIONAL)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.email.existingSecret }}
{{- if or .Values.secrets.email.resendApiKey .Values.secrets.email.sender }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-email
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: email
type: Opaque
stringData:
{{- if .Values.secrets.email.resendApiKey }}
  RESEND_API_KEY: {{ .Values.secrets.email.resendApiKey | quote }}
{{- end }}
{{- if .Values.secrets.email.sender }}
  EMAIL_SENDER: {{ .Values.secrets.email.sender | quote }}
{{- end }}
---
{{- end }}
{{- end }}

# ----------------------------------------------------------------------
# OAuth — Google (OPTIONAL)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.oauthGoogle.existingSecret }}
{{- if or .Values.secrets.oauthGoogle.clientId .Values.secrets.oauthGoogle.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-oauth-google
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: oauth-google
type: Opaque
stringData:
{{- if .Values.secrets.oauthGoogle.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.oauthGoogle.clientId | quote }}
{{- end }}
{{- if .Values.secrets.oauthGoogle.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.oauthGoogle.clientSecret | quote }}
{{- end }}
---
{{- end }}
{{- end }}

# ----------------------------------------------------------------------
# OAuth — generic OIDC (OPTIONAL)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.oauthOidc.existingSecret }}
{{- if or .Values.secrets.oauthOidc.clientId .Values.secrets.oauthOidc.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-oauth-oidc
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: oauth-oidc
type: Opaque
stringData:
{{- if .Values.secrets.oauthOidc.clientId }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oauthOidc.clientId | quote }}
{{- end }}
{{- if .Values.secrets.oauthOidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oauthOidc.clientSecret | quote }}
{{- end }}
{{- if .Values.secrets.oauthOidc.redirectUri }}
  OIDC_REDIRECT_URI: {{ .Values.secrets.oauthOidc.redirectUri | quote }}
{{- end }}
{{- if .Values.secrets.oauthOidc.authorizationEndpoint }}
  OIDC_AUTHORIZATION_ENDPOINT: {{ .Values.secrets.oauthOidc.authorizationEndpoint | quote }}
{{- end }}
{{- if .Values.secrets.oauthOidc.tokenEndpoint }}
  OIDC_TOKEN_ENDPOINT: {{ .Values.secrets.oauthOidc.tokenEndpoint | quote }}
{{- end }}
---
{{- end }}
{{- end }}

# ----------------------------------------------------------------------
# AI (OPTIONAL)
# ----------------------------------------------------------------------
{{- if not .Values.secrets.ai.existingSecret }}
{{- if or .Values.secrets.ai.openaiApiKey .Values.secrets.ai.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: openpanel-ai
  namespace: {{ .Release.Namespace }}
  labels:
    app: openpanel
    component: ai
type: Opaque
stringData:
{{- if .Values.secrets.ai.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.ai.openaiApiKey | quote }}
{{- end }}
{{- if .Values.secrets.ai.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.ai.anthropicApiKey | quote }}
{{- end }}
{{- end }}
{{- end }}
